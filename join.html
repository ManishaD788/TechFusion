<!-- JOIN FORM SECTION -->
<div class="join-form">
    <h2>Join the Club</h2>

    <form>

        <label>Name:</label>
        <input type="text" name="name" placeholder="Enter your full name" required>

        <label>Branch:</label>
        <input type="text" name="branch" placeholder="e.g. CSE, ECE, ME" required>

        <label>Year:</label>
        <input type="text" name="year" placeholder="1st, 2nd, 3rd, 4th" required>

        <label>Email:</label>
        <input type="email" name="email" placeholder="example@gmail.com" required>

        <button type="submit">Submit</button>

    </form>
</div>
